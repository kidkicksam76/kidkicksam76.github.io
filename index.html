<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam Paladino Creations</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <style>
    h1 {
        text-align: center;
    }
    
    body {
        background-color: rgb(107, 191, 219);
    }

    h2 {
        text-align: center;
        margin-top: 80px;
    }

    p {
        text-align: center;
        font-size: 22.5px;
    }

    .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }
    .content {
        margin-top: 60px; /* Prevents content from being hidden behind the navbar */
        padding: 20px;
        }
    </style>
    <div class="navbar">
        <div>Home</div>
    </div>
    <div class="content">
        <p></p>
        <p style="height: 2000px;"></p>
</body>
</html>
