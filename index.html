<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visions Chat Website</title>
    <style>
        /* Basic Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #d41717;
        }
        header {
            background-color: #0078d7;
            color: rgb(20, 214, 68);
            padding: 10px 20px;
            text-align: center;
        }
        .chat-container {
            max-width: 800px;
            margin: 20px auto;
            background: rgb(235, 163, 8);
            border: 1px solid #776a6a;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ff0095;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #331281;
        }
        .message {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            background-color: #85f1ff;
        }
        .send-message {
            display: flex;
            gap: 10px;
        }
        .send-message input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #d11313;
            border-radius: 4px;
        }
        .send-message button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #134b21;
            color: rgb(6, 243, 17);
            cursor: pointer;
        }
        .send-message button:hover {
            background-color: #33021a;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Visions Chat Website</h1>
    </header>
    <div class="chat-container">
        <div class="messages" id="messages">
            <!-- Messages will be dynamically added here -->
        </div>
        <form class="send-message" id="send-message-form">
            <input type="text" id="message-input" placeholder="Type your message..." required />
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        // JavaScript to handle sending messages
        const form = document.getElementById('send-message-form');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            // Get the message text
            const messageText = messageInput.value.trim();
            if (messageText) {
                // Create a new message element
                const newMessage = document.createElement('div');
                newMessage.classList.add('message');
                newMessage.innerHTML = `<strong>You:</strong> ${messageText}`;

                // Append it to the messages container
                messagesDiv.appendChild(newMessage);

                // Scroll to the bottom
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                // Clear the input
                messageInput.value = '';
            }
        });
    </script>
</body>
</html>
