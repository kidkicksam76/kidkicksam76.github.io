<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Support Ticket</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: .5rem;
        }

        input,
        textarea {
            width: 100%;
            padding: .5rem;
            box-sizing: border-box;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: .75rem 1rem;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h2>Submit a Support Ticket</h2>

    <form id="ticketForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" required>
        </div>

        <div class="form-group">
            <label for="contact">Contact Information</label>
            <input type="text" id="contact" placeholder="Email or Phone" required>
        </div>

        <div class="form-group">
            <label for="issue">Issue Description</label>
            <textarea id="issue" rows="5" required></textarea>
        </div>

        <div class="form-group">
            <label for="image">Upload Picture (optional)</label>
            <input type="file" id="image" accept="image/*">
        </div>

        <button type="submit">Submit Ticket</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Replace these with your Supabase credentials
        const SUPABASE_URL = "https://onhocrwspzvqseaxlcte.supabase.co";
        const SUPABASE_KEY = "YOUR_PUBLISHABLE_KEY";

        const client = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY
        );

        document
            .getElementById("ticketForm")
            .addEventListener("submit", async (e) => {

                e.preventDefault();

                const name = document.getElementById("name").value.trim();
                const location = document.getElementById("location").value.trim();
                const contact = document.getElementById("contact").value.trim();
                const issue = document.getElementById("issue").value.trim();

                const { error } = await client
                    .from("tickets")
                    .insert([
                        {
                            name,
                            location,
                            contact,
                            issue
                        }
                    ]);

                if (error) {
                    console.error(error);
                    alert("Error: " + error.message);
                    return;
                }

                alert("Ticket submitted successfully!");

                document.getElementById("ticketForm").reset();
            });
    </script>

</body>
</html>
