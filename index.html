<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Ticket</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; }
        input, textarea { width: 100%; padding: .5rem; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: .75rem 1rem; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Submit a Support Ticket</h2>
    <form id="ticketForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" required>
        </div>
        <div class="form-group">
            <label>Contact Information</label>
            <input type="text" id="contact" placeholder="Email or Phone" required>
        </div>
        <div class="form-group">
            <label>Issue Description</label>
            <textarea id="issue" rows="4" required></textarea>
        </div>
        <div class="form-group">
            <label>Upload Picture</label>
            <input type="file" id="image" accept="image/*">
        </div>
        <button type="submit">Submit Ticket</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 1. Initialize Supabase
  const supabase = supabase.createClient('https://onhocrwspzvqseaxlcte.supabase.co', 'sb_secret_fpcrOKIIu6BMfQ30abtXkg_ZPeF_9nn');

  document.getElementById('ticketForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    // 2. Get values from the form
    const name = document.getElementById('name').value;
    const issue = document.getElementById('issue').value;
    const location = document.getElementById('location').value;
    const contact = document.getElementById('contact').value;

    // 3. Send to Supabase
    const { data, error } = await supabase
      .from('tickets')
      .insert([{ name, issue, location, contact }]);

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Ticket submitted successfully!");
    }
  });
    // index.ts (Supabase Edge Function)
import { serve } from "https://deno.land/std@0.168.0/http/server.ts"

const TELEGRAM_BOT_TOKEN = Deno.env.get('TELEGRAM_BOT_TOKEN')
const TELEGRAM_CHAT_ID = Deno.env.get('TELEGRAM_CHAT_ID')

serve(async (req) => {
  if (req.method === 'OPTIONS') {
    return new Response('ok', { headers: { 'Access-Control-Allow-Origin': '*' } })
  }

  try {
    const { record } = await req.json() // Receives data from Supabase Webhook

    const text = `🚨 *New Support Ticket* 🚨\n\n` +
                 `👤 *Name:* ${record.name}\n` +
                 `📍 *Location:* ${record.location}\n` +
                 `📞 *Contact:* ${record.contact}\n` +
                 `📝 *Issue:* ${record.issue}`;

    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: text,
        parse_mode: 'Markdown'
      })
    })

    return new Response(JSON.stringify({ success: true }), {
      headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' },
    })
  } catch (error) {
    return new Response(JSON.stringify({ error: error.message }), { status: 400 })
  }
})
</script>
    
</body>
</html>
