<!DOCTYPE html>
<html lang="en"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visions Chat sign up</title>
</head>
<body>
  <h1>Fill out what you want</h1>
  <style>
    body {
      background-color: color-mix(in srgb, blue 50%, rgb(14, 207, 14) 50%);
      color: red;
    }
    a {
      color: gold;
    }
  </style>
    <fieldset required><label for="first-name">Enter Your First Name: <input id="first-name" name="first-name" type="text" required /></label>
    <label for="last-name">Enter Your Last Name: <input id="last-name" name="last-name" type="text" required /></label>
    <label for="email">Enter Your Email: <input id="email" name="email" type="email" required /></label>
    <label for="new-password">Create a New Password: <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" /></label>
  </fieldset>
  <fieldset>
    <label for="profile-picture">Upload a profile picture: <input id="profile-picture" type="file" name="file" /></label>
    <label required for="age">Input your age (years): <input id="age" type="number" name="age" min="13" max="120" /></label>
    <label for="bio">Provide a bio:
      <textarea id="bio" name="bio" rows="3" cols="30" placeholder="bio"></textarea>
    </label></fieldset>
    <form action="index.html" method="get">
      <input type="submit" value="Submit" />
  </form>
  


</body>
<main></main>
