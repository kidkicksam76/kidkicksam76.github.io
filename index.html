    <!DOCTYPE html>
    <html  class="background_color" lang="en">
    <head  class="background_color">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Visionar Media</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body  class="background_color"> 
      <h1>Welcome to Vision Media</h1>
      <h2>please fill out the sign up form*.</h2>
      <fieldset><label for="first-name">First Name: <input id="first-name" name="first-name" type="text" required /></label><label for="last-name">Enter Your Last Name: <input id="last-name" name="last-name" type="text" required /></label>
        <label for="email">Enter Your Email: <input id="email" name="email" type="email" required /></label>
        <label for="new-password">Create a New Password: <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" required /></label><label for="profile-picture">Upload a profile picture: <input id="profile-picture" type="file" name="file" /></label>
        <label for="age">Input your age (years): <input id="age" type="number" name="age" min="13" max="120" /></label></fieldset>
        <fieldset><label for="bio">Provide a bio:
          <textarea id="bio" name="bio" rows="3" cols="30" placeholder="I like coding on the beach..."></textarea>
        </label></fieldset>
        <fieldset><label for="terms-and-conditions">
          <input class="inline" id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" /> I accept the <a href="https://www.freecodecamp.org/news/terms-of-service/">terms and conditions</a>
        </label></fieldset>
        <Fieldset><input type="submit" value="Submit" /></Fieldset>
    </body>
    </html>
