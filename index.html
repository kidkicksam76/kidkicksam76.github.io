<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden card">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-8 text-white text-center">
                <i class="fas fa-ticket-alt text-5xl mb-4"></i>
                <h1 class="text-3xl font-bold">Submit a Ticket</h1>
                <p class="opacity-90">We'll get back to you soon</p>
            </div>

            <form id="ticketForm" action="https://formspree.io/f/YOUR_CODE_HERE" method="POST" class="p-8 space-y-6">
                <input type="hidden" name="_subject" value="New Support Ticket!">
                <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html"> <!-- Optional thank you page -->

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Issue / Problem</label>
                    <textarea name="issue" rows="4" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" name="location" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact Info (Email / Phone)</label>
                    <input type="text" name="contact" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Optional Image / Screenshot</label>
                    <input type="file" name="attachment" accept="image/*" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-4 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-paper-plane"></i>
                    Submit Ticket
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('ticketForm').addEventListener('submit', function() {
            setTimeout(() => {
                alert('✅ Ticket submitted! Check your email for confirmation.');
            }, 800);
        });
    </script>
</body>
</html>
