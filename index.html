<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Ticket</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; }
        input, textarea { width: 100%; padding: .5rem; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: .75rem 1rem; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Submit a Support Ticket</h2>
    <form id="ticketForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" required>
        </div>
        <div class="form-group">
            <label>Contact Information</label>
            <input type="text" id="contact" placeholder="Email or Phone" required>
        </div>
        <div class="form-group">
            <label>Issue Description</label>
            <textarea id="issue" rows="4" required></textarea>
        </div>
        <div class="form-group">
            <label>Upload Picture</label>
            <input type="file" id="image" accept="image/*">
        </div>
        <button type="submit">Submit Ticket</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 1. Initialize Supabase
  const supabase = supabase.createClient('https://onhocrwspzvqseaxlcte.supabase.co', 'sb_secret_fpcrOKIIu6BMfQ30abtXkg_ZPeF_9nn');

  document.getElementById('ticketForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    // 2. Get values from the form
    const name = document.getElementById('name').value;
    const issue = document.getElementById('issue').value;
    const location = document.getElementById('location').value;
    const contact = document.getElementById('contact').value;

    // 3. Send to Supabase
    const { data, error } = await supabase
      .from('tickets')
      .insert([{ name, issue, location, contact }]);

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Ticket submitted successfully!");
    }
  });
</script>
    
</body>
</html>
