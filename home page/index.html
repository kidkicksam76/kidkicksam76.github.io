<!DOCTYPE html>
<html class="background_color" lang="en">
<head class="background_color">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Chat Sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="background_color"> 
    <h1>Welcome to Visions Chat</h1>
    <h2>Please fill out the sign-up form to join.</h2>
    <form action="/submit" method="POST" enctype="multipart/form-data">
        <fieldset>
            <label for="first-name">Enter Your First Name: 
                <input id="first-name" name="first-name" type="text" />
            </label>
            <label for="last-name">Enter Your Last Name: 
                <input id="last-name" name="last-name" type="text" />
            </label>
            <label for="email">Enter Your Email: 
                <input id="email" name="email" type="email" />
            </label>
            <label for="new-password">Create a New Password: 
                <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" />
            </label>
            <label for="profile-picture">Upload a profile picture: 
                <input id="profile-picture" type="file" name="file" />
            </label>
            <label for="age">Input your age (years): 
                <input id="age" type="number" name="age" min="13" max="120" />
            </label>
        </fieldset>
        <fieldset>
            <label for="bio">Provide a bio:
                <textarea id="bio" name="bio" rows="3" cols="30" placeholder="Please provide a bio"></textarea>
              </label>
        </fieldset>
        <a type="submit" value="Submit" href="home.html">Submit</a>
        <a type="submit" value="Submit" href="login.html">Login</a>
    </form>
</body>
</html>
