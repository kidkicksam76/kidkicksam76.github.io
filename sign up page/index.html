    <!DOCTYPE html>
    <html  class="background_color" lang="en">
    <head  class="background_color">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Visions Chat Sign up</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body  class="background_color"> 
      <h1>Welcome to Visions Chat</h1>
      <h2>please fill out the sign up form to join.</h2>
      <fieldset><label for="first-name">First Name: <input id="first-name" name="first-name" type="text" required />
      </label><label for="last-name">Last Name: <input id="last-name" name="last-name" type="text" required /></label>
        <label for="email">Email: <input id="email" name="email" type="email" required /></label>
        <label for="new-password">Create a Password: <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" required /></label>
        <label for="profile-picture">profile picture: <input id="profile-picture" type="file" name="file" /></label>
        <label for="age">age in years: <input id="age" type="number" name="age" min="13" max="120" /></label></fieldset>
        <fieldset><label for="bio">Provide a bio:
          <textarea id="bio" name="bio" rows="3" cols="30" placeholder="please enter bio here..."></textarea>
        </label></fieldset>
        <form action="/submit" method="POST">
          <button type="submit">Submit</button>
        </form>
